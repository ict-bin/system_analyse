name: build-image

on:
  push:
    branches: [main, "v2.*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "自定义镜像 tag（留空则用日期-sha）"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: [self-hosted, linux, x64]
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      image_name: ${{ steps.image_name.outputs.lowercase }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate date tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            DATE=$(TZ='Asia/Shanghai' date '+%Y%m%d-%H%M%S')
            echo "tag=${DATE}-${SHA}" >> "$GITHUB_OUTPUT"
          fi
      - name: Lowercase image name
        id: image_name
        run: |
          LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase=$LOWER" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: prepare
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg SECFLOW_BUILD_VERSION=${{ needs.prepare.outputs.tag }} \
            --build-arg CACHE_BUST=${{ github.sha }} \
            --cache-from type=gha,scope=secflow-app-system-analyse-amd64 \
            --cache-to type=gha,scope=secflow-app-system-analyse-amd64,mode=max \
            --file ./Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:amd64-${{ needs.prepare.outputs.tag }} \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:amd64-latest \
            --push \
            .

  build-arm64:
    needs: prepare
    if: ${{ false }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg SECFLOW_BUILD_VERSION=${{ needs.prepare.outputs.tag }} \
            --build-arg CACHE_BUST=${{ github.sha }} \
            --cache-from type=gha,scope=secflow-app-system-analyse-arm64 \
            --cache-to type=gha,scope=secflow-app-system-analyse-arm64,mode=max \
            --file ./Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:arm64-${{ needs.prepare.outputs.tag }} \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:arm64-latest \
            --push \
            .

  merge-manifest:
    needs: [prepare, build-amd64]
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push manifest (latest)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:latest \
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:amd64-latest
      - name: Create and push manifest (date tag)
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.tag }} \
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:amd64-${{ needs.prepare.outputs.tag }}
